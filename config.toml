baseURL = "https://qualityheatingminocqua.com/"
languageCode = "en-us"
title = "Quality Heating, Inc."
enableRobotsTXT = true
disableAliases = true
summaryLength = 30

#################### default parameters ################################

[params]
  logo = "/uploads/Greiber-Heating-Logo.png"
  author = "Quality Heating, Inc."
  # Contact Information
  phone = "715-358-2644"
  email = "quality@newnorth.net"
  address_line_1 = "9752 West Lake Avenue"
  address_line_2 = "Minocqua, WI 54548"
  google_map_directions = "https://maps.app.goo.gl/CVhd4GvP2so3BCA49"
  hours = "Mon-Fri: 8:00am - 4:00pm"
  # Google Analitycs
  minifyBundles = true

# add redirects/headers
  [outputs]
  home = ["HTML", "RSS", "REDIRECTS", "HEADERS"]

# remove .{ext} from text/netlify
[mediaTypes."text/netlify"]
  suffixes = [""]
  delimiter = ""

# add output format for netlify _redirects
[outputFormats.REDIRECTS]
  mediatype = "text/netlify"
  baseName = "_redirects"
  isPlainText = true
  notAlternative = true

# add output format for netlify _headers
[outputFormats.HEADERS]
  mediatype = "text/netlify"
  baseName = "_headers"
  isPlainText = true
  notAlternative = true

[sitemap]
  changefreq = "monthly"
  filename = "sitemap.xml"
  priority = 0.5

[markup.goldmark.renderer]
  unsafe= true

